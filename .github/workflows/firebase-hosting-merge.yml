# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run all checks
        run: npm run check
      - name: Verify generated data is committed
        run: git diff --exit-code -- src/data.js
      - name: Deploy Firestore Rules
        run: |
          node -e "const fs = require('fs'); fs.writeFileSync('service-account.json', process.env.FIREBASE_SERVICE_ACCOUNT)"
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          npx firebase-tools deploy --only firestore:rules --project nako-home-care --debug > firebase-deploy.log 2>&1
          rm service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NAKO_HOME_CARE }}
      - name: Upload Debug Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-deploy-log
          path: firebase-deploy.log
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NAKO_HOME_CARE }}
          channelId: live
          projectId: nako-home-care
