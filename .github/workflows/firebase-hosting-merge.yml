# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bundle data.js
        run: node scripts/bundle.js
      - name: Verify generated data is committed
        run: git diff --exit-code -- src/data.js
      - name: Syntax check JS files
        run: |
          node --check src/app.js
          node --check src/data.js
          node --check src/firebase.js
      - name: Deploy Firestore Rules
        run: |
          node -e "const fs = require('fs'); fs.writeFileSync('service-account.json', process.env.FIREBASE_SERVICE_ACCOUNT)"
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          npx firebase-tools deploy --only firestore:rules --project nako-home-care --debug
          rm service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NAKO_HOME_CARE }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NAKO_HOME_CARE }}
          channelId: live
          projectId: nako-home-care
